version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Voice AI Agent — Docker Compose (full stack, AWS Ubuntu VM)
#
#  All services run in Docker:
#    webhook     → FastAPI app (your Python code)
#    livekit     → Real-time audio SFU
#    redis       → Call state
#    prometheus  → Metrics collection
#    grafana     → Metrics dashboard
#    nginx       → Reverse proxy on port 80
#
#  Usage:
#    docker compose up -d              # start everything
#    docker compose logs -f webhook    # tail webhook logs
#    docker compose ps                 # check all service status
#    docker compose down               # stop everything
#    docker compose build --no-cache   # rebuild after code changes
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Webhook Service (your Python FastAPI app) ─────────────────────────────
  webhook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webhook
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000" # only accessible within the VM, nginx proxies it
    volumes:
      - chromadb_data:/app/data/chromadb # persist the knowledge base
      - ./logs:/app/logs # persist logs on host
    depends_on:
      livekit:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voice-ai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Knowledge Base Seeder (runs once then exits) ──────────────────────────
  # Seeds ChromaDB with documents on first start. Skip if already seeded.
  seeder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seeder
    env_file: .env
    volumes:
      - chromadb_data:/app/data/chromadb
    command: ["python", "scripts/seed_knowledge_base.py"]
    depends_on:
      - webhook
    networks:
      - voice-ai-net
    restart: "no" # run once and exit

  # ── LiveKit Server ────────────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    network_mode: host # REQUIRED for UDP WebRTC to work on AWS
    volumes:
      - ./infra/livekit.yaml:/etc/livekit.yaml:ro
    command: --config /etc/livekit.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - voice-ai-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    networks:
      - voice-ai-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - voice-ai-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - webhook
      - grafana
      - prometheus
    networks:
      - voice-ai-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  chromadb_data: # knowledge base — persists across restarts
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  voice-ai-net:
    driver: bridge
