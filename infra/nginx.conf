# ─────────────────────────────────────────────────────────────────────────────
#  Nginx — Voice AI Agent reverse proxy (AWS)
#
#  All services are now Docker containers on the voice-ai-net network.
#  Nginx uses Docker service names (webhook, grafana, prometheus) as hostnames.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
events {
    worker_connections 4096;
}

http {
    # ── Upstreams — use Docker container names as hostnames ────────────────
    upstream webhook_service {
        server webhook:8000;
        keepalive 64;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream prometheus {
        server prometheus:9090;
    }

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Timeouts (important for long-running Twilio streams) ───────────────
    proxy_read_timeout    3600s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    3600s;
    client_max_body_size  10m;

    gzip on;
    gzip_types text/plain application/json application/xml;

    server {
        listen 80;
        server_name _;

        # Health check
        location = /health {
            proxy_pass http://webhook_service/health;
            proxy_set_header Host $host;
        }

        # Twilio webhooks + Media Streams WebSocket bridge
        # Upgrade headers are required for /twilio/stream/<room> WebSocket connections
        location /twilio/ {
            proxy_pass         http://webhook_service/twilio/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Grafana
        location /grafana/ {
            proxy_pass         http://grafana/;
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # Prometheus
        location /prometheus/ {
            proxy_pass http://prometheus/;
            proxy_set_header Host $host;
        }

        # API docs + simulate endpoint + all other routes
        location / {
            proxy_pass         http://webhook_service/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}