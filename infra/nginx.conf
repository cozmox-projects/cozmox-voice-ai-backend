# ─────────────────────────────────────────────────────────────────────────────
#  Nginx — Voice AI Agent reverse proxy (AWS)
#
#  All services are now Docker containers on the voice-ai-net network.
#  Nginx uses Docker service names (webhook, grafana, prometheus) as hostnames.
#
#  LiveKit runs with network_mode: host (required for WebRTC UDP).
#  It is NOT on voice-ai-net. Nginx proxies to it via the host gateway IP
#  (172.17.0.1 on Docker bridge networks, or host.docker.internal).
#  We expose LiveKit on port 443 (HTTPS/WSS) so browsers can connect
#  without Mixed Content blocks.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
events {
    worker_connections 4096;
}

http {
    # ── Upstreams — use Docker container names as hostnames ────────────────
    upstream webhook_service {
        server webhook:8000;
        keepalive 64;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream prometheus {
        server prometheus:9090;
    }

    # LiveKit runs with network_mode: host — reachable via host gateway
    upstream livekit_server {
        server 172.17.0.1:7880;
        keepalive 16;
    }

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Timeouts (important for long-running Twilio streams) ───────────────
    proxy_read_timeout    3600s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    3600s;
    client_max_body_size  10m;

    gzip on;
    gzip_types text/plain application/json application/xml;

    # ── HTTP server (port 80) — webhook + observability ───────────────────
    server {
        listen 80;
        server_name _;

        # Health check
        location = /health {
            proxy_pass http://webhook_service/health;
            proxy_set_header Host $host;
        }

        # Twilio webhooks + Media Streams WebSocket bridge
        # Upgrade headers are required for /twilio/stream/<room> WebSocket connections
        location /twilio/ {
            proxy_pass         http://webhook_service/twilio/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Grafana
        location /grafana/ {
            proxy_pass         http://grafana/;
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # Prometheus
        location /prometheus/ {
            proxy_pass http://prometheus/;
            proxy_set_header Host $host;
        }

        # API docs + simulate endpoint + all other routes
        location / {
            proxy_pass         http://webhook_service/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── HTTPS server (port 443) — LiveKit WSS endpoint ────────────────────
    #
    # This is what makes meet.livekit.io work.
    # Browsers block ws:// from https:// pages (Mixed Content).
    # By terminating TLS here and proxying to LiveKit on 7880,
    # the browser connects via wss:// which is allowed.
    #
    # CERT PATHS — set to whichever you used:
    #   Let's Encrypt:  /etc/letsencrypt/live/<your-domain>/fullchain.pem
    #   Self-signed:    /etc/nginx/certs/livekit.crt
    server {
        listen 443 ssl;
        server_name _;

        # ── TLS certificates ──────────────────────────────────────────────
        # OPTION A (Let's Encrypt — domain required):
        #   ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        #   ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
        #
        # OPTION B (self-signed — raw IP):
        ssl_certificate     /etc/nginx/certs/livekit.crt;
        ssl_certificate_key /etc/nginx/certs/livekit.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── LiveKit WebSocket proxy ───────────────────────────────────────
        # All traffic on port 443 goes to LiveKit.
        # LiveKit's own signaling WebSocket is at /rtc
        # but the SDK connects to the root — proxy everything.
        location / {
            proxy_pass         http://livekit_server/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebRTC signaling needs long timeouts
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 10s;
        }
    }
}