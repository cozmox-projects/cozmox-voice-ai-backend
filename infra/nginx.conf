# ─────────────────────────────────────────────────────────────────────────────
#  Nginx Configuration — Voice AI Agent (AWS)
#
#  Routes:
#    /                → FastAPI webhook service on host:8000
#    /grafana/        → Grafana on localhost:3000
#    /prometheus/     → Prometheus on localhost:9090
#
#  Twilio sends webhooks to:  http://<AWS-IP>/twilio/incoming
#  Grafana accessible at:     http://<AWS-IP>/grafana
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
events {
    worker_connections 4096;
}

http {
    # ── Upstream services ──────────────────────────────────────────────────
    upstream webhook_service {
        server host.docker.internal:8000;
        keepalive 64;
    }

    upstream grafana {
        server host.docker.internal:3000;
    }

    upstream prometheus {
        server host.docker.internal:9090;
    }

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_method $request_uri $status '
                    '$body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Timeouts (important for long-running Twilio streams) ───────────────
    proxy_read_timeout     3600s;
    proxy_connect_timeout  10s;
    proxy_send_timeout     3600s;
    client_max_body_size   10m;

    # ── Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/xml;

    # ── Main server ────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Health check (load balancer / uptime monitor) ──────────────────
        location = /health {
            proxy_pass http://webhook_service/health;
            proxy_set_header Host $host;
        }

        # ── Twilio webhooks ────────────────────────────────────────────────
        location /twilio/ {
            proxy_pass         http://webhook_service/twilio/;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── All webhook API endpoints ──────────────────────────────────────
        location / {
            proxy_pass         http://webhook_service/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Grafana ────────────────────────────────────────────────────────
        location /grafana/ {
            proxy_pass         http://grafana/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Prometheus ─────────────────────────────────────────────────────
        location /prometheus/ {
            proxy_pass http://prometheus/;
            proxy_set_header Host $host;
        }

        # ── API docs (FastAPI swagger) ─────────────────────────────────────
        location /docs {
            proxy_pass http://webhook_service/docs;
            proxy_set_header Host $host;
        }
    }
}
