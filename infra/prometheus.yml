global:
  scrape_interval: 5s
  evaluation_interval: 5s
  scrape_timeout: 4s

scrape_configs:
  # Webhook service — Docker container on voice-ai-net
  - job_name: "webhook_service"
    static_configs:
      - targets: ["webhook:8000"]
    metrics_path: /metrics

  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
